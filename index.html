<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#185FA5">
<title>KANTOビジネスマッチング</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#378ADD;--green:#3B6D11;--green-light:#EAF3DE;--gray:#5F5E5A;--gray-light:#F1EFE8;--gray-mid:#D3D1C7;--bg:#fff;--bg2:#F8F8F6;--border:#E0DFD8;--text:#1a1a18;--text2:#5F5E5A;--text3:#888780;--radius:12px;--radius-sm:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--blue);color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:20}
.header-top{display:flex;align-items:center;gap:10px}
.header-logo{font-size:20px}
.header-title{font-size:16px;font-weight:600}
.header-sub{font-size:9px;opacity:.9;margin-top:1px}
.header-badge{margin-left:auto;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;font-size:11px;white-space:nowrap}
.tab-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:69px;z-index:19}
.tab{flex:1;padding:7px 2px 5px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text3);font-size:9px;font-family:inherit;border-bottom:2px solid transparent;position:relative}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-icon{font-size:18px;line-height:1}
.dot{width:7px;height:7px;background:#E24B4A;border-radius:50%;position:absolute;top:5px;right:calc(50% - 14px)}
.screen{display:none;flex:1;overflow-y:auto;padding:16px;padding-bottom:24px}
.screen.active{display:block}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;color:var(--text2);margin-bottom:5px;display:block}
.form-label span{color:#E24B4A;margin-left:2px}
input[type=text],input[type=email],select,textarea{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);-webkit-appearance:none;transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(55,138,221,.15)}
textarea{min-height:72px;resize:vertical;line-height:1.5}
.btn{display:block;width:100%;padding:13px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .2s;text-align:center}
.btn-primary{background:var(--blue);color:#fff}
.btn-outline{background:var(--bg);color:var(--blue);border:1px solid var(--blue)}
.btn-sm{padding:7px 14px;font-size:13px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;border:none;font-family:inherit}
.btn-accept{background:var(--blue);color:#fff}
.btn-decline{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-pref{background:var(--blue-light);color:var(--blue)}
.badge-dept{background:var(--green-light);color:var(--green)}
.badge-conn{background:var(--green-light);color:var(--green)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.match-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.match-header{display:flex;gap:12px;align-items:flex-start}
.match-info{flex:1;min-width:0}
.match-name{font-size:15px;font-weight:600}
.match-company{font-size:12px;color:var(--text2);margin-top:1px}
.match-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.match-pr{font-size:13px;color:var(--text2);margin-top:7px;font-style:italic;border-left:3px solid var(--gray-mid);padding-left:9px}
.match-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.score-bar{background:var(--gray-light);border-radius:4px;height:5px;margin:8px 0}
.score-fill{border-radius:4px;height:5px;transition:width .8s}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:var(--bg);color:var(--text2);flex-shrink:0}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin:16px 0 10px}
.sec-header h3{font-size:14px;font-weight:600}
.sec-header span{font-size:12px;color:var(--text3)}
.req-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.req-btns{display:flex;gap:8px;margin-top:10px}
.req-btns button{flex:1}
.conn-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;cursor:pointer}
.conn-info{flex:1;min-width:0}
.conn-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conn-meta{font-size:12px;color:var(--text2);margin-top:1px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border-radius:var(--radius-sm);padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--blue)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.msg-item{display:flex;gap:10px;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}
.msg-info{flex:1;min-width:0}
.msg-name{font-size:14px;font-weight:600}
.msg-last{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unread-dot{width:9px;height:9px;background:#E24B4A;border-radius:50%;flex-shrink:0}
.chat-screen{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100vh;background:var(--bg);z-index:30;flex-direction:column}
.chat-screen.open{display:flex}
.chat-header{background:var(--blue);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1}
.chat-name{font-size:15px;font-weight:600}
.chat-sub{font-size:11px;opacity:.8}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.bubble-wrap{display:flex;gap:8px;align-items:flex-end}
.bubble-wrap.me{flex-direction:row-reverse}
.bubble{max-width:74%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
.bubble.me{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.bubble.other{background:var(--bg2);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.bubble-time{font-size:10px;color:var(--text3);margin-bottom:2px}
.chat-bar{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--bg);flex-shrink:0}
.chat-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);resize:none;max-height:100px;line-height:1.4}
.chat-input:focus{outline:none;border-color:var(--blue-mid)}
.chat-send{width:40px;height:40px;border-radius:50%;background:var(--blue);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.empty-state{text-align:center;padding:48px 24px}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;color:var(--text2);line-height:1.6}
.qr-hint{background:var(--blue-light);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:var(--blue);margin-bottom:14px;display:flex;gap:10px;align-items:center}
.error-msg{color:#A32D2D;font-size:13px;margin-top:6px;display:none}
.loading{text-align:center;padding:40px;color:var(--text3)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--gray-mid);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#2C2C2A;color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;opacity:0;transition:all .3s;z-index:100;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <span class="header-logo">🤝</span>
      <div>
        <div class="header-title">KANTOビジネスマッチング</div>
        <div class="header-sub">公益社団法人日本青年会議所関東地区協議会広域経済圏構築委員会</div>
      </div>
      <div class="header-badge" id="online-count">0名参加中</div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('register')" id="tab-register"><span class="tab-icon">📋</span>登録</button>
    <button class="tab" onclick="showTab('match')" id="tab-match"><span class="tab-icon">🔍</span>マッチング</button>
    <button class="tab" onclick="showTab('requests')" id="tab-requests" style="position:relative"><span class="tab-icon">📬</span>申請<span class="dot" id="req-dot" style="display:none"></span></button>
    <button class="tab" onclick="showTab('messages')" id="tab-messages" style="position:relative"><span class="tab-icon">💬</span>メッセージ<span class="dot" id="msg-dot" style="display:none"></span></button>
    <button class="tab" onclick="showTab('profile')" id="tab-profile"><span class="tab-icon">👤</span>マイページ</button>
  </div>

  <!-- 登録 -->
  <div class="screen active" id="screen-register">
    <div id="reg-done" style="display:none">
      <div class="card" style="text-align:center;padding:24px;border-color:var(--blue-mid);border-width:2px">
        <div style="font-size:36px;margin-bottom:10px">✅</div>
        <div style="font-size:17px;font-weight:600;margin-bottom:6px">登録済みです</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px" id="reg-done-name"></div>
        <button class="btn btn-outline" onclick="showTab('match')">マッチングを見る</button>
        <button class="btn" style="margin-top:8px;color:#A32D2D" onclick="resetProfile()">別の情報で登録し直す</button>
      </div>
    </div>
    <div id="reg-form">
      <div class="qr-hint"><span style="font-size:20px">📱</span><span>会場でQRコードから開いてその場で登録できます</span></div>
      <div class="form-group">
        <label class="form-label">お名前<span>*</span></label>
        <input type="text" id="f-name" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label class="form-label">会社名<span>*</span></label>
        <input type="text" id="f-company" placeholder="株式会社○○">
      </div>
      <div class="form-group">
        <label class="form-label">都道府県<span>*</span></label>
        <select id="f-pref">
          <option value="">選択してください</option>
          <option>東京都</option>
          <option>神奈川県</option>
          <option>千葉県</option>
          <option>埼玉県</option>
          <option>群馬県</option>
          <option>栃木県</option>
          <option>茨城県</option>
          <option>山梨県</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">業種<span>*</span></label>
        <select id="f-dept">
          <option value="">選択してください</option>
          <optgroup label="金融・保険・不動産">
            <option>銀行・信用金庫・信用組合</option>
            <option>証券・投資・ファンド</option>
            <option>保険（生命・損害）</option>
            <option>不動産・住宅</option>
            <option>リース・クレジット</option>
          </optgroup>
          <optgroup label="建設・土木・設備">
            <option>総合建設（ゼネコン）</option>
            <option>工務店・リフォーム</option>
            <option>設備工事（電気・管・空調）</option>
            <option>土木・造園・舗装</option>
          </optgroup>
          <optgroup label="製造・メーカー">
            <option>食品・飲料・農産物</option>
            <option>化学・素材・樹脂</option>
            <option>機械・設備・金型</option>
            <option>電気・電子・半導体</option>
            <option>自動車・輸送機器</option>
            <option>建材・木材・家具</option>
            <option>繊維・アパレル・雑貨</option>
            <option>印刷・紙・包装</option>
          </optgroup>
          <optgroup label="IT・通信・メディア">
            <option>ソフトウェア・システム開発</option>
            <option>Web制作・デザイン</option>
            <option>通信・ネットワーク</option>
            <option>メディア・広告・PR</option>
            <option>ゲーム・エンタメ・映像</option>
          </optgroup>
          <optgroup label="流通・小売・サービス">
            <option>卸売・商社</option>
            <option>小売・EC</option>
            <option>飲食・レストラン・カフェ</option>
            <option>ホテル・観光・旅行</option>
            <option>物流・倉庫・運送</option>
          </optgroup>
          <optgroup label="医療・福祉・教育">
            <option>病院・クリニック・歯科</option>
            <option>調剤薬局・医療機器</option>
            <option>介護・福祉・保育</option>
            <option>教育・学習塾・研修</option>
          </optgroup>
          <optgroup label="専門サービス">
            <option>税理士・会計事務所</option>
            <option>弁護士・司法書士・行政書士</option>
            <option>社労士・中小企業診断士</option>
            <option>コンサルティング</option>
            <option>人材・採用・派遣</option>
          </optgroup>
          <optgroup label="エネルギー・環境・農業">
            <option>電力・ガス・石油</option>
            <option>再生可能エネルギー</option>
            <option>環境・リサイクル・廃棄物</option>
            <option>農業・林業・水産</option>
          </optgroup>
          <optgroup label="その他">
            <option>団体・NPO・公的機関</option>
            <option>その他</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">役職・職種<span>*</span></label>
        <input type="text" id="f-job" placeholder="例: 代表取締役、営業部長、Webエンジニア">
      </div>
      <div class="form-group">
        <label class="form-label">一言PR <span style="color:var(--text3);font-weight:400">(任意)</span></label>
        <textarea id="f-pr" placeholder="例: 中小企業の資金調達を専門に支援。融資・補助金活用のご相談歓迎"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">メールアドレス <span style="color:var(--text3);font-weight:400">(通知用・任意)</span></label>
        <input type="email" id="f-email" placeholder="example@email.com">
      </div>
      <div id="reg-error" class="error-msg"></div>
      <button class="btn btn-primary" id="reg-btn" onclick="register()">参加登録して入場 →</button>
    </div>
  </div>

  <!-- マッチング -->
  <div class="screen" id="screen-match">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">全員</button>
      <button class="filter-btn" onclick="setFilter('neighbor',this)">近隣県</button>
      <button class="filter-btn" onclick="setFilter('same',this)">同業種</button>
    </div>
    <div id="match-list"><div class="loading"><span class="spinner"></span>読み込み中...</div></div>
  </div>

  <!-- 申請 -->
  <div class="screen" id="screen-requests">
    <div class="sec-header"><h3>受信した申請</h3><span id="req-count">0件</span></div>
    <div id="req-list"><div class="empty-state"><div class="icon">📭</div><p>申請はまだありません</p></div></div>
    <div class="sec-header"><h3>コネクション一覧</h3><span id="conn-count">0件</span></div>
    <div id="conn-list"><div class="empty-state"><div class="icon">🤝</div><p>まだコネクションがありません</p></div></div>
  </div>

  <!-- メッセージ -->
  <div class="screen" id="screen-messages">
    <div id="msg-list"><div class="empty-state"><div class="icon">💬</div><p>コネクション成立後に<br>メッセージが送れます</p></div></div>
  </div>

  <!-- プロフィール -->
  <div class="screen" id="screen-profile">
    <div id="profile-content"><div class="empty-state"><div class="icon">👤</div><p>先に登録タブから<br>参加登録してください</p></div></div>
  </div>
</div>

<!-- チャット -->
<div class="chat-screen" id="chat-screen">
  <div class="chat-header">
    <button class="chat-back" onclick="closeChat()">←</button>
    <div style="flex:1">
      <div class="chat-name" id="chat-name"></div>
      <div class="chat-sub" id="chat-sub"></div>
    </div>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-bar">
    <textarea class="chat-input" id="chat-input" placeholder="メッセージを入力..." rows="1" oninput="autoResize(this)" onkeydown="onKey(event)"></textarea>
    <button class="chat-send" onclick="sendMsg()">➤</button>
  </div>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://jskvobgulnjpohwmrpip.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impza3ZvYmd1bG5qcG9od21ycGlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY1NTAsImV4cCI6MjA5MTMyMjU1MH0.tYXWIRfhJ1HAZBrqA5f_MBZj8lTGvy-HjAjO6Vm4ZPw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const NEIGHBORS = {

  '神奈川県':['東京都','山梨県'],
  '千葉県':['東京都','茨城県'],
  '埼玉県':['東京都','群馬県','栃木県','茨城県'],
  '群馬県':['埼玉県','栃木県','山梨県'],
  '栃木県':['埼玉県','群馬県','茨城県'],

  '山梨県':['神奈川県','群馬県']
};
const DEPTGROUP = {
  '金融・保険':['銀行・信用金庫・信用組合','証券・投資・ファンド','保険（生命・損害）','リース・クレジット'],
  '不動産・建設':['不動産・住宅','総合建設（ゼネコン）','工務店・リフォーム','設備工事（電気・管・空調）','土木・造園・舗装'],
  '製造':['食品・飲料・農産物','化学・素材・樹脂','機械・設備・金型','電気・電子・半導体','自動車・輸送機器','建材・木材・家具','繊維・アパレル・雑貨','印刷・紙・包装'],
  'IT・メディア':['ソフトウェア・システム開発','Web制作・デザイン','通信・ネットワーク','メディア・広告・PR','ゲーム・エンタメ・映像'],
  '流通・サービス':['卸売・商社','小売・EC','飲食・レストラン・カフェ','ホテル・観光・旅行','物流・倉庫・運送'],
  '医療・教育':['病院・クリニック・歯科','調剤薬局・医療機器','介護・福祉・保育','教育・学習塾・研修'],
  '専門サービス':['税理士・会計事務所','弁護士・司法書士・行政書士','社労士・中小企業診断士','コンサルティング','人材・採用・派遣'],
  'エネルギー・農業':['電力・ガス・石油','再生可能エネルギー','環境・リサイクル・廃棄物','農業・林業・水産']
};
const AVATARS = ['#E6F1FB:#185FA5','#EAF3DE:#3B6D11','#EEEDFE:#534AB7','#FAEEDA:#854F0B','#FAECE7:#993C1D','#E1F5EE:#0F6E56'];

let me = null, participants = [], requests = [], connections = [], curFilter = 'all', chatPartner = null, chatSub = null;

window.addEventListener('DOMContentLoaded', async () => {
  const id = localStorage.getItem('jc_my_id');
  if (id) await loadMe(id);
  await loadParticipants();
  subRealtime();
});

async function loadMe(id) {
  const { data } = await sb.from('participants').select('*').eq('id', id).single();
  if (data) { me = data; showDone(); await loadReqsConns(); }
  else localStorage.removeItem('jc_my_id');
}

async function loadParticipants() {
  const { data } = await sb.from('participants').select('*').order('created_at', { ascending: false });
  participants = data || [];
  document.getElementById('online-count').textContent = participants.length + '名参加中';
  if (document.getElementById('screen-match').classList.contains('active')) renderMatches();
}

async function loadReqsConns() {
  if (!me) return;
  const { data } = await sb.from('match_requests')
    .select('*, from:from_id(*), to:to_id(*)')
    .or('from_id.eq.' + me.id + ',to_id.eq.' + me.id);
  requests = data || [];
  const pending = requests.filter(r => r.to_id === me.id && r.status === 'pending');
  document.getElementById('req-dot').style.display = pending.length ? 'block' : 'none';
  document.getElementById('req-count').textContent = pending.length + '件';
  connections = requests.filter(r => r.status === 'accepted')
    .map(r => r.from_id === me.id ? r.to : r.from).filter(Boolean);
  document.getElementById('conn-count').textContent = connections.length + '件';
  const active = document.querySelector('.screen.active') && document.querySelector('.screen.active').id;
  if (active === 'screen-requests') renderRequests();
  if (active === 'screen-messages') renderMsgList();
  if (active === 'screen-profile') renderProfile();
}

function subRealtime() {
  sb.channel('app')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'participants' }, () => loadParticipants())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'match_requests' }, () => { if (me) loadReqsConns(); })
    .subscribe();
}

async function register() {
  const name = document.getElementById('f-name').value.trim();
  const company = document.getElementById('f-company').value.trim();
  const pref = document.getElementById('f-pref').value;
  const dept = document.getElementById('f-dept').value;
  const job = document.getElementById('f-job').value.trim();
  const pr = document.getElementById('f-pr').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const err = document.getElementById('reg-error');
  if (!name || !company || !pref || !dept || !job) {
    err.style.display = 'block'; err.textContent = '必須項目をすべて入力してください'; return;
  }
  err.style.display = 'none';
  const btn = document.getElementById('reg-btn'); btn.textContent = '登録中...'; btn.disabled = true;
  const { data, error } = await sb.from('participants')
    .insert([{ name, company, prefecture: pref, dept, job, pr, line_user_id: email }]).select().single();
  btn.textContent = '参加登録して入場 →'; btn.disabled = false;
  if (error) { err.style.display = 'block'; err.textContent = '登録に失敗しました。もう一度お試しください'; return; }
  me = data; localStorage.setItem('jc_my_id', data.id);
  showToast('✅ 登録完了！'); showDone();
  await loadParticipants(); await loadReqsConns();
  setTimeout(() => showTab('match'), 1200);
}

function showDone() {
  document.getElementById('reg-form').style.display = 'none';
  document.getElementById('reg-done').style.display = 'block';
  document.getElementById('reg-done-name').textContent = me.name + ' / ' + me.company;
}
function resetProfile() {
  localStorage.removeItem('jc_my_id'); me = null;
  document.getElementById('reg-form').style.display = 'block';
  document.getElementById('reg-done').style.display = 'none';
}

function deptScore(d1, d2) {
  if (!d1 || !d2) return 0;
  if (d1 === d2) return 100;
  for (const g of Object.values(DEPTGROUP)) if (g.includes(d1) && g.includes(d2)) return 60;
  return 15;
}
function prefScore(p1, p2) {
  if (!p1 || !p2) return 0;
  if (p1 === p2) return 40;
  if (NEIGHBORS[p1] && NEIGHBORS[p1].includes(p2)) return 80;
  return 15;
}
function calcScore(a, b) { return Math.round(deptScore(a.dept, b.dept) * 0.65 + prefScore(a.prefecture, b.prefecture) * 0.35); }
function isNeighbor(p1, p2) { return p1 === p2 || (NEIGHBORS[p1] && NEIGHBORS[p1].includes(p2)); }
function sameDeptGroup(d1, d2) {
  if (d1 === d2) return true;
  for (const g of Object.values(DEPTGROUP)) if (g.includes(d1) && g.includes(d2)) return true;
  return false;
}

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderMatches();
}

function renderMatches() {
  const el = document.getElementById('match-list');
  if (!me) { el.innerHTML = '<div class="empty-state"><div class="icon">👋</div><p>先に登録してください</p></div>'; return; }
  let list = participants.filter(p => p.id !== me.id);
  if (curFilter === 'neighbor') list = list.filter(p => isNeighbor(me.prefecture, p.prefecture));
  if (curFilter === 'same') list = list.filter(p => sameDeptGroup(me.dept, p.dept));
  list = list.map(p => Object.assign({}, p, { _score: calcScore(me, p) })).sort((a, b) => b._score - a._score);
  if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>条件に合う参加者がいません</p></div>'; return; }
  el.innerHTML = list.map(function(p, i) {
    const ac = AVATARS[i % AVATARS.length].split(':');
    const init = p.name.split(/\s+/).map(function(s) { return s[0]; }).join('').slice(0, 2);
    const isConn = connections.find(function(c) { return c && c.id === p.id; });
    const sent = requests.find(function(r) { return r.from_id === me.id && r.to_id === p.id; });
    const neighbor = isNeighbor(me.prefecture, p.prefecture);
    const sc = p._score;
    const barColor = sc >= 80 ? 'var(--blue-mid)' : sc >= 50 ? '#639922' : 'var(--gray-mid)';
    const scoreColor = sc >= 80 ? 'var(--blue)' : sc >= 50 ? 'var(--green)' : 'var(--gray)';
    let action = '';
    const pid = p.id;
    if (isConn) action = '<span class="badge badge-conn">✓ 成立</span><button class="btn-sm btn-accept" style="margin-left:auto" onclick="openChat(\'' + pid + '\')">💬 メッセージ</button>';
    else if (sent && sent.status === 'accepted') action = '<span class="badge badge-conn">✓ 承認済み</span>';
    else if (sent) action = '<span class="badge" style="background:var(--gray-light);color:var(--gray)">送信済み</span>';
    else action = '<button class="btn-sm btn-accept" onclick="sendReq(\'' + pid + '\')">申請する</button>';
    return '<div class="match-card">'
      + '<div class="match-header">'
      + '<div class="avatar" style="width:46px;height:46px;background:' + ac[0] + ';color:' + ac[1] + ';font-size:16px">' + init + '</div>'
      + '<div class="match-info"><div class="match-name">' + p.name + '</div><div class="match-company">' + p.company + '</div>'
      + '<div class="match-tags"><span class="badge badge-pref">📍 ' + p.prefecture + '</span>'
      + (neighbor ? '<span class="badge" style="background:#FAEEDA;color:#633806">近隣</span>' : '')
      + '</div></div>'
      + '<div style="text-align:right"><div style="font-size:24px;font-weight:700;color:' + scoreColor + ';line-height:1">' + sc + '</div>'
      + '<div style="font-size:10px;color:var(--text3)">マッチ度</div></div>'
      + '</div>'
      + '<div class="score-bar"><div class="score-fill" style="width:' + sc + '%;background:' + barColor + '"></div></div>'
      + '<span class="badge badge-dept">' + p.dept + '</span>'
      + (p.job ? '<div style="font-size:13px;color:var(--text2);margin-top:6px">役職: ' + p.job + '</div>' : '')
      + (p.pr ? '<div class="match-pr">' + p.pr + '</div>' : '')
      + '<div class="match-actions">' + action + '</div>'
      + '</div>';
  }).join('');
}

async function sendReq(toId) {
  if (!me) { showToast('先に登録してください'); return; }
  const { error } = await sb.from('match_requests').insert([{ from_id: me.id, to_id: toId, status: 'pending' }]);
  if (error) { showToast('申請に失敗しました'); return; }
  showToast('📬 申請を送信しました！'); await loadReqsConns(); renderMatches();
}
async function acceptReq(reqId) {
  await sb.from('match_requests').update({ status: 'accepted' }).eq('id', reqId);
  showToast('🎉 コネクション成立！'); await loadReqsConns(); renderMatches();
}
async function declineReq(reqId) {
  await sb.from('match_requests').update({ status: 'declined' }).eq('id', reqId);
  showToast('辞退しました'); await loadReqsConns();
}

function renderRequests() {
  const pending = requests.filter(function(r) { return r.to_id === me.id && r.status === 'pending'; });
  const rEl = document.getElementById('req-list');
  if (!pending.length) {
    rEl.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>申請はまだありません</p></div>';
  } else {
    rEl.innerHTML = pending.map(function(r, i) {
      const p = r.from; if (!p) return '';
      const ac = AVATARS[i % AVATARS.length].split(':');
      const init = (p.name || '').split(/\s+/).map(function(s) { return s[0]; }).join('').slice(0, 2) || '?';
      return '<div class="req-card">'
        + '<div style="display:flex;gap:10px;align-items:center">'
        + '<div class="avatar" style="width:42px;height:42px;background:' + ac[0] + ';color:' + ac[1] + ';font-size:14px">' + init + '</div>'
        + '<div><div style="font-size:15px;font-weight:600">' + p.name + '</div>'
        + '<div style="font-size:12px;color:var(--text2)">' + p.company + ' / ' + p.prefecture + '</div>'
        + '<div style="font-size:12px;color:var(--text2)">' + p.dept + '</div></div></div>'
        + '<div class="req-btns">'
        + '<button class="btn-sm btn-decline" onclick="declineReq(\'' + r.id + '\')">辞退</button>'
        + '<button class="btn-sm btn-accept" onclick="acceptReq(\'' + r.id + '\')">承認する</button>'
        + '</div></div>';
    }).join('');
  }
  const cEl = document.getElementById('conn-list');
  document.getElementById('conn-count').textContent = connections.length + '件';
  if (!connections.length) {
    cEl.innerHTML = '<div class="empty-state"><div class="icon">🤝</div><p>まだコネクションがありません</p></div>';
  } else {
    cEl.innerHTML = connections.map(function(p, i) {
      if (!p) return '';
      const ac = AVATARS[i % AVATARS.length].split(':');
      const init = (p.name || '').split(/\s+/).map(function(s) { return s[0]; }).join('').slice(0, 2) || '?';
      return '<div class="conn-card" onclick="openChat(\'' + p.id + '\')">'
        + '<div class="avatar" style="width:40px;height:40px;background:' + ac[0] + ';color:' + ac[1] + ';font-size:13px">' + init + '</div>'
        + '<div class="conn-info"><div class="conn-name">' + p.name + '</div><div class="conn-meta">' + p.company + ' · ' + p.prefecture + '</div></div>'
        + '<span style="color:var(--blue);font-size:16px">💬</span></div>';
    }).join('');
  }
}

async function renderMsgList() {
  const el = document.getElementById('msg-list');
  if (!me || !connections.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>コネクション成立後に<br>メッセージが送れます</p></div>'; return;
  }
  el.innerHTML = '<div class="loading"><span class="spinner"></span>読み込み中...</div>';
  const items = await Promise.all(connections.map(async function(p, i) {
    if (!p) return null;
    const { data: msgs } = await sb.from('messages').select('*')
      .or('and(from_id.eq.' + me.id + ',to_id.eq.' + p.id + '),and(from_id.eq.' + p.id + ',to_id.eq.' + me.id + ')')
      .order('created_at', { ascending: false }).limit(1);
    const last = msgs && msgs[0];
    const { count } = await sb.from('messages').select('*', { count: 'exact', head: true })
      .eq('to_id', me.id).eq('from_id', p.id).is('read_at', null);
    const ac = AVATARS[i % AVATARS.length].split(':');
    const init = (p.name || '').split(/\s+/).map(function(s) { return s[0]; }).join('').slice(0, 2) || '?';
    return { p: p, last: last, unread: count || 0, ac: ac, init: init, ts: (last && last.created_at) || '' };
  }));
  const valid = items.filter(Boolean).sort(function(a, b) { return b.ts.localeCompare(a.ts); });
  if (!valid.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>コネクション成立後に<br>メッセージが送れます</p></div>'; return;
  }
  el.innerHTML = valid.map(function(item) {
    const p = item.p, last = item.last, unread = item.unread, ac = item.ac, init = item.init;
    return '<div class="msg-item" onclick="openChat(\'' + p.id + '\')">'
      + '<div class="avatar" style="width:46px;height:46px;background:' + ac[0] + ';color:' + ac[1] + ';font-size:15px">' + init + '</div>'
      + '<div class="msg-info"><div class="msg-name">' + p.name + '</div>'
      + '<div class="msg-last">' + (last ? esc(last.content) : 'まだメッセージはありません') + '</div></div>'
      + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
      + '<div style="font-size:11px;color:var(--text3)">' + (last ? timeStr(last.created_at) : '') + '</div>'
      + (unread > 0 ? '<span class="unread-dot"></span>' : '')
      + '</div></div>';
  }).join('');
  document.getElementById('msg-dot').style.display = valid.some(function(v) { return v.unread > 0; }) ? 'block' : 'none';
}

async function openChat(partnerId) {
  const p = participants.find(function(x) { return x.id === partnerId; })
    || connections.find(function(x) { return x && x.id === partnerId; });
  if (!p || !me) return;
  chatPartner = p;
  document.getElementById('chat-name').textContent = p.name;
  document.getElementById('chat-sub').textContent = p.company + ' / ' + p.dept;
  document.getElementById('chat-screen').classList.add('open');
  document.body.style.overflow = 'hidden';
  await loadMsgs(partnerId);
  if (chatSub) sb.removeChannel(chatSub);
  chatSub = sb.channel('chat-' + partnerId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, function(pl) {
      const m = pl.new;
      if ((m.from_id === me.id && m.to_id === partnerId) || (m.from_id === partnerId && m.to_id === me.id)) addBubble(m);
    }).subscribe();
  await sb.from('messages').update({ read_at: new Date().toISOString() })
    .eq('to_id', me.id).eq('from_id', partnerId).is('read_at', null);
}

async function loadMsgs(partnerId) {
  const el = document.getElementById('chat-msgs');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>読み込み中...</div>';
  const { data } = await sb.from('messages').select('*')
    .or('and(from_id.eq.' + me.id + ',to_id.eq.' + partnerId + '),and(from_id.eq.' + partnerId + ',to_id.eq.' + me.id + ')')
    .order('created_at', { ascending: true });
  el.innerHTML = '';
  if (!data || !data.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">まだメッセージはありません<br>最初のメッセージを送ってみましょう！</div>'; return;
  }
  data.forEach(function(m) { addBubble(m); });
  scrollBottom();
}

function addBubble(m) {
  const el = document.getElementById('chat-msgs');
  const isMe = m.from_id === me.id;
  el.querySelectorAll('[data-empty]').forEach(function(e) { e.remove(); });
  const div = document.createElement('div');
  div.className = 'bubble-wrap' + (isMe ? ' me' : '');
  div.innerHTML = '<div style="display:flex;flex-direction:column;align-items:' + (isMe ? 'flex-end' : 'flex-start') + '">'
    + '<div class="bubble-time">' + timeStr(m.created_at) + '</div>'
    + '<div class="bubble ' + (isMe ? 'me' : 'other') + '">' + esc(m.content).replace(/\n/g, '<br>') + '</div>'
    + '</div>';
  el.appendChild(div);
  scrollBottom();
}
function scrollBottom() { const el = document.getElementById('chat-msgs'); el.scrollTop = el.scrollHeight; }

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content || !me || !chatPartner) return;
  input.value = ''; autoResize(input);
  const { error } = await sb.from('messages').insert([{ from_id: me.id, to_id: chatPartner.id, content: content }]);
  if (error) showToast('送信に失敗しました');
}
function closeChat() {
  document.getElementById('chat-screen').classList.remove('open');
  document.body.style.overflow = '';
  chatPartner = null;
  if (chatSub) { sb.removeChannel(chatSub); chatSub = null; }
  if (document.getElementById('screen-messages').classList.contains('active')) renderMsgList();
}
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }

function renderProfile() {
  if (!me) return;
  const el = document.getElementById('profile-content');
  const init = me.name.split(/\s+/).map(function(s) { return s[0]; }).join('').slice(0, 2);
  const sent = requests.filter(function(r) { return r.from_id === me.id; }).length;
  const received = requests.filter(function(r) { return r.to_id === me.id; }).length;
  el.innerHTML = '<div style="background:linear-gradient(135deg,var(--blue),#0C447C);color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:16px;text-align:center">'
    + '<div style="width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;margin:0 auto 12px">' + init + '</div>'
    + '<div style="font-size:20px;font-weight:700;margin-bottom:4px">' + me.name + '</div>'
    + '<div style="font-size:14px;opacity:.85">' + me.company + '</div>'
    + '<div style="margin-top:10px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'
    + '<span class="badge" style="background:rgba(255,255,255,.25);color:#fff">📍 ' + me.prefecture + '</span>'
    + '<span class="badge" style="background:rgba(255,255,255,.25);color:#fff">' + me.dept + '</span>'
    + '</div></div>'
    + '<div class="stat-grid">'
    + '<div class="stat-card"><div class="stat-num">' + received + '</div><div class="stat-label">受信申請</div></div>'
    + '<div class="stat-card"><div class="stat-num">' + sent + '</div><div class="stat-label">送信申請</div></div>'
    + '<div class="stat-card" style="background:var(--blue-light)"><div class="stat-num">' + connections.length + '</div><div class="stat-label">コネクション</div></div>'
    + '</div>'
    + '<div class="card"><div style="font-size:13px;color:var(--text2);margin-bottom:4px">役職・職種</div>'
    + '<div style="font-size:15px;font-weight:500">' + me.job + '</div>'
    + (me.pr ? '<div style="margin-top:10px;font-size:13px;color:var(--text2)">PR</div><div style="font-size:14px;margin-top:4px;line-height:1.6">' + me.pr + '</div>' : '')
    + '</div>'
    + '<button class="btn btn-outline" style="margin-top:4px" onclick="resetProfile();showTab(\'register\')">プロフィールを編集</button>';
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'match') renderMatches();
  if (name === 'requests' && me) renderRequests();
  if (name === 'messages' && me) renderMsgList();
  if (name === 'profile' && me) renderProfile();
}

function timeStr(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date(), diff = now - d;
  if (diff < 60000) return 'たった今';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '時間前';
  return d.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' });
}
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}
</script>
